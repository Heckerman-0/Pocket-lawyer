<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pocket Lawyer</title>
  <style>
    body {
      font-family: -apple-system, Segoe UI, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      color: #4ecdc4;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #4ecdc4;
      color: #0a0a14;
    }
    .msg.bot {
      align-self: flex-start;
      background: #2a2a4a;
    }
    #input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      border-top: 1px solid #2a2a4a;
    }
    #input-area input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #2a2a4a;
      color: #eee;
      font-size: 14px;
    }
    #input-area button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #4ecdc4;
      color: #0a0a14;
      font-weight: bold;
      cursor: pointer;
    }
    #input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header><h1>⚖️ Pocket Lawyer — Legal Q&A</h1></header>
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="userInput" placeholder="Ask a legal question..." />
    <button id="sendBtn">Send</button>
  </div>
  <script src="chat.js"></script>
</body>
</html>
