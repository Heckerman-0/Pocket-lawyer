<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pocket Lawyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="splash">
    <span class="splash-icon">&#9878;</span>
    <span class="splash-text">Pocket Lawyer</span>
  </div>

  <div id="app" style="display:none;">
    <nav id="sidebar">
      <div class="logo" id="logoBtn">
        <span class="logo-icon">&#9878;</span>
        <span class="logo-text">Pocket Lawyer</span>
      </div>
      <div class="nav-items">
        <button class="nav-item active" data-section="home">
          <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-section="chat">
          <span class="nav-label">Chat</span>
        </button>
        <button class="nav-item disabled" data-section="documents">
          <span class="nav-label">Documents</span>
          <span class="nav-badge">Coming soon</span>
        </button>
      </div>
    </nav>

    <main id="content">
      <section id="view-home" class="view">
        <div class="home-wrap">
          <span class="home-icon">&#9878;</span>
          <h1 class="home-title">Pocket Lawyer</h1>
          <p class="home-tagline">Private legal Q&amp;A, powered entirely by a local AI model on your machine.</p>
          <button id="startChatBtn">Start chatting</button>
        </div>
      </section>

      <section id="view-chat" class="view" style="display:none;">
        <header id="content-header">
          <h1>Legal Q&amp;A</h1>
          <p class="subtitle">Ask a question in plain language. Answers are generated locally and are not legal advice.</p>
        </header>

        <div id="messages"></div>

        <div id="input-area">
          <input type="text" id="userInput" placeholder="Ask a legal question..." />
          <button id="sendBtn">Send</button>
        </div>
      </section>
    </main>
  </div>
  <script src="chat.js"></script>
</body>
</html>
